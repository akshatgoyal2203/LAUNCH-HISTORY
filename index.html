<!DOCTYPE html>
<html>

<head>

<title>Rocket Launch Explorer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#000428,#004e92);
}

.controls{
text-align:center;
margin:20px;
}

.timeline{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#141414;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,195,255,0.3);
}

.card img{
width:100%;
border-radius:6px;
margin-top:10px;
}

.date{
color:#00c3ff;
font-weight:bold;
}

select{
padding:8px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<header>

<h1>🚀 Global Rocket Launch Explorer</h1>
<p>Scroll to explore the full history of rocket launches</p>

</header>

<div class="controls">

<select id="agencyFilter">
<option value="ALL">All Agencies</option>
</select>

<h3 id="launchCount"></h3>

</div>

<div class="timeline" id="timeline"></div>




<script>

const timeline = document.getElementById("timeline")
const agencyFilter = document.getElementById("agencyFilter")
const launchCount = document.getElementById("launchCount")

let launches=[]
let nextURL="https://ll.thespacedevs.com/2.2.0/launch/?limit=60"
let loading=false

async function loadLaunches(){

if(loading || !nextURL) return
loading=true

try{

const response = await fetch(nextURL)

if(response.status===429){
console.log("API rate limit reached")
return
}

const data = await response.json()

launches = launches.concat(data.results)

nextURL = data.next

populateAgencies()
applyFilter()

}catch(err){

console.log(err)

}

loading=false

}

function populateAgencies(){

let agencies=new Set()

launches.forEach(l=>{

const agency=l.launch_service_provider?.name

if(agency) agencies.add(agency)

})

agencyFilter.innerHTML='<option value="ALL">All Agencies</option>'

agencies.forEach(a=>{
agencyFilter.innerHTML+=`<option value="${a}">${a}</option>`
})

}

agencyFilter.addEventListener("change",applyFilter)

function applyFilter(){

const selected=agencyFilter.value

timeline.innerHTML=""

let filtered=launches

if(selected!=="ALL"){

filtered=launches.filter(l =>
l.launch_service_provider?.name===selected
)

}

launchCount.innerText="Total Launches: "+filtered.length

filtered.forEach(l=>{

const agency=l.launch_service_provider?.name || "Unknown"
const rocket=l.rocket?.configuration?.name || "Unknown"
const site=l.pad?.name || "Unknown"
const image=l.image || ""

timeline.innerHTML+=`

<div class="card">

<div class="date">${new Date(l.net).toDateString()}</div>

<h3>${l.name}</h3>

<p><b>Rocket:</b> ${rocket}</p>

<p><b>Agency:</b> ${agency}</p>

<p><b>Launch Site:</b> ${site}</p>

${image?`<img src="${image}">`:""}

</div>

`

})

}

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-700){

setTimeout(loadLaunches,100)

}

})

loadLaunches()

</script>

</body>

</html>
