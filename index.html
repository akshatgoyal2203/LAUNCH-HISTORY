<!DOCTYPE html>
<html>

<head>

<title>Rocket Launch Explorer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#000428,#004e92);
}

.timeline{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#141414;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,195,255,0.3);
}

.card img{
width:100%;
border-radius:6px;
margin-top:10px;
}

.date{
color:#00c3ff;
font-weight:bold;
}

.pagination{
text-align:center;
margin-bottom:40px;
}

button{
padding:10px 20px;
margin:10px;
border:none;
background:#00c3ff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<h1>🚀 Rocket Launch Explorer</h1>
<p>Browse rocket launches from around the world</p>

</header>

<div class="timeline" id="timeline">

<p style="text-align:center">Loading launches...</p>

</div>

<div class="pagination">

<button onclick="previousPage()">Previous</button>

<span id="pageNumber"></span>

<button onclick="nextPage()">Next</button>

</div>

<script>

const timeline=document.getElementById("timeline")
const pageNumber=document.getElementById("pageNumber")

let page=1
const limit=40

async function loadPage(){

timeline.innerHTML="<p>Loading launches...</p>"

const offset=(page-1)*limit

const url=`https://ll.thespacedevs.com/2.2.0/launch/?limit=${limit}&offset=${offset}`

const response=await fetch(url)
const data=await response.json()

timeline.innerHTML=""

data.results.forEach(l=>{

const image=l.image?l.image:""

timeline.innerHTML+=`

<div class="card">

<div class="date">${new Date(l.net).toDateString()}</div>

<h3>${l.name}</h3>

<p><b>Rocket:</b> ${l.rocket.configuration.name}</p>

<p><b>Agency:</b> ${l.launch_service_provider.name}</p>

<p><b>Launch Site:</b> ${l.pad.name}</p>

${image?`<img src="${image}">`:""}

</div>

`

})

pageNumber.innerText="Page "+page

}

function nextPage(){

page++
loadPage()

}

function previousPage(){

if(page>1){
page--
loadPage()
}

}

loadPage()

</script>

</body>

</html>
