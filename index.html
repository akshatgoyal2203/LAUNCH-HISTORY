<!DOCTYPE html>
<html>

<head>

<title>Rocket Launch Explorer</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#000428,#004e92);
}

.controls{
text-align:center;
margin:20px;
}

.timeline{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#141414;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,195,255,0.3);
}

.card img{
width:100%;
border-radius:6px;
margin-top:10px;
}

.date{
color:#00c3ff;
font-weight:bold;
}

input,select{
padding:8px;
margin:8px;
border-radius:6px;
border:none;
}

button{
display:block;
margin:20px auto;
padding:10px 20px;
border:none;
background:#00c3ff;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

#map{
height:400px;
margin:20px;
}

</style>

</head>

<body>

<header>

<h1>🚀 Global Rocket Launch Explorer</h1>
<p>Explore the history of space launches</p>

</header>

<div class="controls">

<input type="text" id="searchBox" placeholder="Search rocket..." onkeyup="applyFilters()">

<select id="agencyFilter" onchange="applyFilters()">
<option value="ALL">All Agencies</option>
</select>

<br>

<label>Year:</label>
<input type="range" id="yearSlider" min="1957" max="2030" value="2030" oninput="applyFilters()">

<span id="yearLabel">Up to 2030</span>

<h3 id="launchCount"></h3>

<h2 id="nextLaunch"></h2>

</div>

<div id="map"></div>

<div class="timeline" id="timeline"></div>

<button onclick="loadLaunches()">Load More Launches</button>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const timeline=document.getElementById("timeline")
const agencyFilter=document.getElementById("agencyFilter")
const launchCount=document.getElementById("launchCount")
const yearSlider=document.getElementById("yearSlider")
const yearLabel=document.getElementById("yearLabel")
const searchBox=document.getElementById("searchBox")
const nextLaunch=document.getElementById("nextLaunch")

let launches=[]
let offset=0
const limit=40

const map=L.map('map').setView([20,0],2)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

async function loadLaunches(){

const url=`https://ll.thespacedevs.com/2.2.0/launch/?limit=${limit}&offset=${offset}`

const response=await fetch(url)
const data=await response.json()

launches=launches.concat(data.results)

populateAgencies()

applyFilters()

showNextLaunch()

offset+=limit

}

function populateAgencies(){

let agencies=new Set()

launches.forEach(l=>{
agencies.add(l.launch_service_provider.name)
})

agencyFilter.innerHTML='<option value="ALL">All Agencies</option>'

agencies.forEach(a=>{
agencyFilter.innerHTML+=`<option value="${a}">${a}</option>`
})

}

function applyFilters(){

const selectedAgency=agencyFilter.value
const selectedYear=parseInt(yearSlider.value)
const search=searchBox.value.toLowerCase()

yearLabel.innerText="Up to "+selectedYear

let filtered=launches.filter(l=>{

const year=new Date(l.net).getFullYear()

const agencyMatch=(selectedAgency==="ALL" || l.launch_service_provider.name===selectedAgency)

const yearMatch=(year<=selectedYear)

const searchMatch=l.rocket.configuration.name.toLowerCase().includes(search)

return agencyMatch && yearMatch && searchMatch

})

displayLaunches(filtered)

}

function displayLaunches(list){

timeline.innerHTML=""

launchCount.innerText="Total Launches: "+list.length

map.eachLayer(layer=>{
if(layer instanceof L.Marker) map.removeLayer(layer)
})

list.forEach(l=>{

const image=l.image?l.image:""

timeline.innerHTML+=`

<div class="card">

<div class="date">${new Date(l.net).toDateString()}</div>

<h3>${l.name}</h3>

<p><b>Rocket:</b> ${l.rocket.configuration.name}</p>

<p><b>Agency:</b> ${l.launch_service_provider.name}</p>

<p><b>Launch Site:</b> ${l.pad.name}</p>

${image?`<img src="${image}">`:""}

</div>

`

if(l.pad.latitude && l.pad.longitude){

L.marker([l.pad.latitude,l.pad.longitude])
.addTo(map)
.bindPopup(l.name)

}

})

}

function showNextLaunch(){

const upcoming=launches.find(l=> new Date(l.net) > new Date())

if(upcoming){

const time=new Date(upcoming.net)-new Date()

const days=Math.floor(time/(1000*60*60*24))

nextLaunch.innerText="Next Launch: "+upcoming.name+" in "+days+" days"

}

}

loadLaunches()

</script>

</body>

</html>
