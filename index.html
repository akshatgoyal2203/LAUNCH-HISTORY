<!DOCTYPE html>
<html>

<head>

<title>Rocket Launch Explorer</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

header{
text-align:center;
padding:30px;
background:linear-gradient(90deg,#000428,#004e92);
}

h1{
font-size:40px;
}

.timeline{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{

background:#141414;
padding:20px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,195,255,0.3);
transition:0.4s;

}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
border-radius:6px;
}

.date{
color:#00c3ff;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>🚀 Rocket Launch Explorer</h1>
<p>All launches from the beginning of spaceflight to today</p>

</header>

<div class="timeline" id="timeline"></div>

<script>

const timeline = document.getElementByTd("timeline")

let offset = 0
const limit = 100

async function loadLaunches(){
    const url = 'https://ll.thespacedevs.com/2.2.0/launch/?limit=${limit}&offset=${offset}'
    const response = await fetch(url)
    const data = await response.json()
    data.results.forEach(launch => {

        timeline.innerHTML += `
        <div class="card">
            <div class ="date">${l.net}</div>
            <h3>${l.name}</h3>
            <p><b>Rocket:</b> ${l.rocket.configuration.name}</p>
            <p><b>Launch Site:</b> ${l.pad.name}</p>
            <img src="${l.image || ""}">
        </div>
        `
    })
    offset += limit
    if(data.result.length === limit){
        loadLaunches()
    }
}

loadLaunches()

</script>

</body>

</html>
